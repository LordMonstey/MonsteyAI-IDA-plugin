name: Bug report
description: Report a setup, IDA, provider, UI, or analysis problem.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Monstey-AI-plugin. Please remove API keys, private dumps, IDBs, and proprietary names before posting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the failure and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open IDA
        2. Load plugin
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment report
      description: Paste the output of scripts/check_environment.ps1.
      render: text
    validations:
      required: false
  - type: textarea
    id: debug-trace
    attributes:
      label: Monstey debug trace
      description: Paste Copy Debug Trace output if the issue happened during analysis.
      render: text
    validations:
      required: false
